<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oak & Co. | Pokedex</title>
    <link rel="stylesheet" href="style/catalogo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://imgs.search.brave.com/BdCUDXIaqTg0VNCvkE4so5hrvEW5yj-eiCHSqZ2jSzI/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4u/aWNvbnNjb3V0LmNv/bS9pY29uL3ByZW1p/dW0vcG5nLTI1Ni10/aHVtYi9wb2tlYm9s/YS1pY29uLXN2Zy1k/b3dubG9hZC1wbmct/MTA3Njg4MjkucG5n/P2Y9d2VicCZ3PTEy/OA">
</head>
<body>
    <div class="vignette"></div>
    <div class="film-grain"></div>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <img src="pokeicon.png" alt="Oak & Co." class="header-logo">
                <span class="logo-text">Oak & Co.</span>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Digite nome ou ID..." autocomplete="off" list="pokemon-suggestions">
                <datalist id="pokemon-suggestions"></datalist>
                <button id="search-btn" class="search-btn">Buscar</button>
            </div>
            <nav class="main-nav">
                <a href="index.html">Início</a>
                <a href="produtos.html">Serviços</a>
                <a href="institucional.html">Instituição</a>
                <a href="catalogo.html" class="active">Pokédex</a>
            </nav>
        </div>
    </header>

    <div class="filters-container" id="filters-container">
        <button class="type-filter active" data-type="all">Todos</button>
        <button class="type-filter" data-type="normal">Normal</button>
        <button class="type-filter" data-type="fire">Fogo</button>
        <button class="type-filter" data-type="water">Água</button>
        <button class="type-filter" data-type="electric">Elétrico</button>
        <button class="type-filter" data-type="grass">Grama</button>
        <button class="type-filter" data-type="ice">Gelo</button>
        <button class="type-filter" data-type="fighting">Lutador</button>
        <button class="type-filter" data-type="poison">Venenoso</button>
        <button class="type-filter" data-type="ground">Terra</button>
        <button class="type-filter" data-type="flying">Voador</button>
        <button class="type-filter" data-type="psychic">Psíquico</button>
        <button class="type-filter" data-type="bug">Inseto</button>
        <button class="type-filter" data-type="rock">Pedra</button>
        <button class="type-filter" data-type="ghost">Fantasma</button>
        <button class="type-filter" data-type="dragon">Dragão</button>
        <button class="type-filter" data-type="dark">Sombrio</button>
        <button class="type-filter" data-type="steel">Aço</button>
        <button class="type-filter" data-type="fairy">Fada</button>
    </div>

    <section class="favorites-section" id="favorites-section" style="display: none;">
        <h2 class="favorites-title">Pokémon Favoritos</h2>
        <div id="favorites-grid" class="favorites-grid"></div>
    </section>

    <div id="catalog-grid" class="catalog-grid"></div>

    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Detalhes</h2>
                <button id="modal-close" class="modal-close">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="script/catalogo.js" defer></script>
</body>
</html>
